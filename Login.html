<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login Page</title>

    <style>
       body {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
  font-family: Arial;
  background: linear-gradient(to right, #74ebd5, #ACB6E5);
}

.login-box {
  background: white;
  padding: 30px;
  width: 300px;
  border-radius: 10px;
  box-shadow: 0px 0px 10px gray;
  text-align: center;
}

.login-box h2 {
  margin-bottom: 20px;
}

.login-box input {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
  border: 1px solid #ccc;
  border-radius: 5px;
}

.login-box button {
  width: 100%;
  padding: 10px;
  background: blue;
  color: white;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

.login-box button:hover {
  background: darkblue;
  cursor:pointer;
}

.links {
  margin-top: 15px;
}

.links a {
  text-decoration: none;
  color: blue;
  display: block;
  margin: 5px 0;
}
    </style>
</head>

<body style ="display: flex;
justify-content: center;
align-items: center;
height: 100vh;
margin: 0;
flex-direction: column;">
<button onclick="window.location.href = 'index.html'">
    Go to Home
</button>
<div class="login-box">
    <h2>Login</h2>

    <form>
        <input type="text" placeholder="Username" required>
        <input type="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>

    <div class="links">
        <p><a href="#">Forgot Password?</a></p>
        <p><a href="Registration.html">Create Account</a></p>
    </div>
</div>

</body>
</html>
