<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Modern Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
        }

        body {
            /* Background mein ek soft gradient jo premium feel dega */
            background: linear-gradient(45deg, #89b7c0, #638d9e, #4caccc);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .register-container {
            background: #ffffff;
            padding: 50px 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            color: #1a1a1a;
            margin-bottom: 10px;
        }

        .welcome-text {
            color: #d437d4; /* Golden color for premium look */
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 35px;
            letter-spacing: 1px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: #555555;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #eee;
            border-radius: 10px;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s ease;
            background: #fdfdfd;
        }

        input:focus {
            border-color: #2c5364;
            background: #fff;
            box-shadow: 0 0 10px rgba(44, 83, 100, 0.1);
        }

        .btn-register {
            width: 100%;
            padding: 15px;
            background: linear-gradient(to right, #b300d3, #b300d3);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 15px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-register:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(230, 34, 181, 0.4);
        }

        .footer-text {
            margin-top: 25px;
            font-size: 0.85rem;
            color: #777;
        }

        .footer-text a {
            color: #d300ac;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="register-container">
        <h1>Register</h1>
        <p class="welcome-text">Welcome to our platform</p>

        <form>
            <div class="form-group">
                <label>Full Name *</label>
                <input type="text" placeholder="Enter your full name">
            </div>

            <div class="form-group">
                <label>Email *</label>
                <input type="email" placeholder="example@mail.com">
            </div>

            <div class="form-group">
                <label>Password *</label>
                <input type="password" placeholder="••••••••">
            </div>

            <div class="form-group">
                <label>Confirm Password *</label>
                <input type="password" placeholder="••••••••">
            </div>

            <button type="submit" class="btn-register">Register Now</button>
        </form>

        <p class="footer-text">Already have an account? <a href="#">Login here</a></p>
    </div>

</body>
</html>
